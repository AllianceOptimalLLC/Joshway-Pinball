<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOSHWAY PINBALL</title>
  <style>
    body { margin: 0; background: #111; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; }
    canvas { border: 4px solid #f97316; image-rendering: pixelated; }
    .title { font-size: 32px; color: #facc15; text-shadow: 2px 2px 0 #000; margin: 10px; }
    .controls { font-size: 14px; margin: 10px; }
    .score { font-size: 24px; color: #4ade80; }
  </style>
</head>
<body>
  <div class="title">JOSHWAY PINBALL</div>
  <div class="score">SCORE: <span id="score">000000</span> | BALLS: <span id="balls">3</span></div>
  <canvas id="game" width="600" height="800"></canvas>
  <div class="controls">
    LEFT FLIPPER: Z or LEFT SHIFT | RIGHT FLIPPER: / or RIGHT SHIFT | PLUNGER: SPACE<br>
    Joshway Courage Pinball - Collect Star Rings!
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
